<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BudgetPro Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div id="notificationBox" class="notification-box hidden"></div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>BudgetPro</h2>
    <ul>
      <li onclick="showPage('dashboard')">Dashboard</li>
      <li onclick="showPage('addExpense')">Add Expense</li>
      <li onclick="showPage('history')">History</li>
      <li onclick="showPage('analytics')">Analytics</li>
    </ul>
  </div>

  <!-- CONTENT -->
  <div class="content">







    

    <div id="notification" class="notification"></div>

    <!-- ================= DASHBOARD ================= -->
    <div id="dashboard" class="page">

  <div class="dashboard-header">
    <h1 class="greeting">Welcome back, <span id="userName"></span> 👋</h1>
    <p class="subtext">Your financial overview for this month</p>
  </div>

  <div class="dashboard-main">

    <!-- LEFT SIDE CARDS -->
    <div class="dashboard-cards">

      <div class="glass-card">
        <p>Total Spent</p>
        <h2 id="spent">₹0</h2>
      </div>

      <div class="glass-card">
        <p>Monthly Budget</p>
        <h2>₹ <span id="budgetAmount">0</span></h2>
        <input type="number" id="dashboardBudgetInput" placeholder="Enter budget">
        <button id="updateBudgetBtn">Update Budget</button>
      </div>

      <div class="glass-card">
        <p>Remaining</p>
        <h2 id="remaining">₹0</h2>
      </div>

    </div>

    <!-- RIGHT SIDE PROGRESS RING -->
    <div class="progress-section">
      <div class="progress-ring">
        <svg width="220" height="220">
          <circle cx="110" cy="110" r="95" stroke="#1e1e2f" stroke-width="15" fill="none"/>
          <circle id="progressCircle"
                  cx="110"
                  cy="110"
                  r="95"
                  stroke="url(#gradient)"
                  stroke-width="15"
                  fill="none"
                  stroke-linecap="round"
                  stroke-dasharray="597"
                  stroke-dashoffset="597"/>
          <defs>
            <linearGradient id="gradient">
              <stop offset="0%" stop-color="#00c6ff"/>
              <stop offset="100%" stop-color="#a044ff"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="progress-text">
          <h2 id="progressPercent">0%</h2>
          <p>Budget Used</p>
        </div>
      </div>
    </div>

  </div>

  <!-- INSIGHT BOX -->
  <div class="insight-box">
    <p id="insightText">You are managing your money well.</p>
  </div>

</div>

    <!-- ================= ADD EXPENSE ================= -->
    <div id="addExpense" class="page hidden">

      <h2>Add Expense</h2>

      <input type="number" id="expenseAmount" placeholder="Amount"><br><br>

      <input type="text" id="expenseCategory"
             placeholder="Enter Category (Food, Rent, Travel...)"><br><br>

      <button id="addExpenseBtn">Save Expense</button>

    </div>

    <!-- ================= HISTORY ================= -->
    <div id="history" class="page hidden">

      <h2 class="history-title">Transaction History</h2>

      <div id="historyList" class="history-list"></div>

    </div>

    <!-- ================= ANALYTICS ================= -->
    <div id="analytics" class="page hidden">

      <h2>Analytics</h2>

      <div class="analytics-box">
        <canvas id="categoryChart"></canvas>
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
